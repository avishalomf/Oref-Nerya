name: Fetch Oref Alerts

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch alerts
        run: python fetch_alerts.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerts.json alerts_history.json alert_log.json
          git diff --cached --quiet || git commit -m "update alerts"
          git push
