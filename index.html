<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="פיקוד העורף-נריה" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="manifest" href="manifest.json" />
  <title>פיקוד העורף-נריה</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', Arial, sans-serif; }
    button { font-family: inherit; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(248,81,73,0.5); }
      50%       { box-shadow: 0 0 0 12px rgba(248,81,73,0); }
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .card { animation: fadeIn 0.3s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const VERSION     = "1.8";
    // כתובת ה-Worker של Cloudflare — תמלא אחרי ההגדרה
    const WORKER_URL  = "https://oref-nerya.avishalomf.workers.dev";
    const ALERTS_URL  = `${WORKER_URL}/alerts`;
    const HISTORY_URL = `${WORKER_URL}/history`;
    const LOG_URL     = null; // לא בשימוש במצב Worker
    const FILTER_AREA = "נריה";
    const POLL_MS     = 30 * 1000; // דגימה כל 30 שניות

    const CATEGORY_LABELS = {
      1: "🚀 ירי רקטות וטילים", 2: "✈️ חדירת כלי טיס עוין",
      3: "☢️ חומרים מסוכנים",   4: "🌊 צונאמי",
      5: "🏠 חדירת מחבלים",     6: "⚠️ אירוע בלתי מוגדר",
      7: "🌋 רעידת אדמה",       13: '🛸 כטב"מ עוין',
    };

    const AudioCtx = window.AudioContext || window.webkitAudioContext;

    function playSound(type) {
      if (!AudioCtx) return;
      const ctx = new AudioCtx();
      const sounds = {
        siren: (c) => {
          const o = c.createOscillator(), g = c.createGain();
          o.connect(g); g.connect(c.destination);
          o.type = "sawtooth";
          g.gain.setValueAtTime(0.4, c.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 2.5);
          [0,0.6,1.2,1.8,2.4].forEach((t,i) => o.frequency.linearRampToValueAtTime(i%2===0?440:880, c.currentTime+t));
          o.start(); o.stop(c.currentTime + 2.5);
        },
        beep: (c) => {
          [0,0.3,0.6].forEach(t => {
            const o = c.createOscillator(), g = c.createGain();
            o.connect(g); g.connect(c.destination);
            o.type = "sine"; o.frequency.value = 880;
            g.gain.setValueAtTime(0.5, c.currentTime+t);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+t+0.25);
            o.start(c.currentTime+t); o.stop(c.currentTime+t+0.25);
          });
        },
        deep: (c) => {
          const o = c.createOscillator(), g = c.createGain();
          o.connect(g); g.connect(c.destination);
          o.type = "square"; o.frequency.value = 220;
          g.gain.setValueAtTime(0.4, c.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+1.5);
          o.start(); o.stop(c.currentTime+1.5);
        },
        allclear: (c) => {
          // דו-מי-סול — מנגינת שגרה
          [261.63, 329.63, 392.00].forEach((freq, i) => {
            const o = c.createOscillator(), g = c.createGain();
            o.connect(g); g.connect(c.destination);
            o.type = "sine"; o.frequency.value = freq;
            const t = c.currentTime + i * 0.28;
            g.gain.setValueAtTime(0.0, t);
            g.gain.linearRampToValueAtTime(0.45, t + 0.05);
            g.gain.setValueAtTime(0.45, t + 0.18);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
            o.start(t); o.stop(t + 0.55);
          });
        },
      };
      if (sounds[type]) sounds[type](ctx);
    }

    function formatTime(d) {
      if (!d) return "";
      return new Date(d).toLocaleString("he-IL", {
        day:"2-digit", month:"2-digit", year:"numeric",
        hour:"2-digit", minute:"2-digit", second:"2-digit",
      });
    }

    function SoundPicker({ value, onChange }) {
      return (
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12, color:"#8b949e", marginBottom:8}}>🎵 צליל התראה:</div>
          <div style={{display:"flex", gap:8, flexWrap:"wrap", marginBottom:10}}>
            {[["siren","🚨 סירנה"],["beep","📣 צפצוף"],["deep","🔔 עמוק"],["none","🔇 שקט"]].map(([id,label]) => (
              <button key={id}
                onClick={() => { onChange(id); if (id !== "none") playSound(id); }}
                style={{
                  padding:"6px 14px", borderRadius:20, fontSize:13, cursor:"pointer",
                  background: value===id ? "#1f6feb" : "#21262d",
                  border: value===id ? "1px solid #388bfd" : "1px solid #30363d",
                  color: value===id ? "#fff" : "#8b949e",
                }}>{label}</button>
            ))}
          </div>
          <div style={{fontSize:12, color:"#8b949e", marginBottom:8}}>✅ צליל חזרה לשגרה:</div>
          <button onClick={() => playSound("allclear")}
            style={{padding:"6px 18px", borderRadius:20, fontSize:13, cursor:"pointer",
              background:"#0f2a1a", border:"1px solid #3fb950", color:"#3fb950"}}>
            ▶ דו-מי-סול
          </button>
        </div>
      );
    }

    function App() {
      const [activeAlerts,  setActiveAlerts]  = React.useState(null);
      const [history,       setHistory]       = React.useState([]);
      const [error,         setError]         = React.useState(null);
      const [loading,       setLoading]       = React.useState(false);
      const [lastUpdate,    setLastUpdate]    = React.useState(null);
      const [tab,           setTab]           = React.useState("active");
      const [alertSound,    setAlertSound]    = React.useState("siren");
      const [justCleared,   setJustCleared]   = React.useState(false);
      const [log,           setLog]           = React.useState([]);
      const [installPrompt, setInstallPrompt] = React.useState(null);

      React.useEffect(() => {
        const h = (e) => { e.preventDefault(); setInstallPrompt(e); };
        window.addEventListener("beforeinstallprompt", h);
        return () => window.removeEventListener("beforeinstallprompt", h);
      }, []);

      const handleInstall = async () => {
        if (!installPrompt) return;
        installPrompt.prompt();
        await installPrompt.userChoice;
        setInstallPrompt(null);
      };

      const fetchAlerts = React.useCallback(async (isAuto=false) => {
        setLoading(true); setError(null);
        try {
          const res = await fetch(ALERTS_URL + "?t=" + Date.now());
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          const hasNow = Array.isArray(data?.data) && data.data.length > 0;
          setActiveAlerts(prev => {
            const hadBefore = Array.isArray(prev?.data) && prev.data.length > 0;
            if (isAuto) {
              if (hasNow && !hadBefore) {
                if (alertSound !== "none") playSound(alertSound);
                if ("Notification" in window && Notification.permission === "granted")
                  new Notification("⚠️ התראת פיקוד העורף", { body: data.data.join(", ") });
                setJustCleared(false);
              } else if (!hasNow && hadBefore) {
                playSound("allclear");
                if ("Notification" in window && Notification.permission === "granted")
                  new Notification("✅ חזרה לשגרה", { body: `אזור ${FILTER_AREA}` });
                setJustCleared(true);
                setTimeout(() => setJustCleared(false), 10000);
              }
            }
            return data;
          });
          setLastUpdate(new Date());
        } catch(e) { setError(e.message); }
        finally { setLoading(false); }
      }, [alertSound]);

      const fetchLog = React.useCallback(async () => {
        if (!LOG_URL) return; // לא זמין במצב Worker
        try {
          const res = await fetch(LOG_URL + "?t=" + Date.now());
          if (!res.ok) return;
          const data = await res.json();
          if (Array.isArray(data)) {
            const since = Date.now() - 24 * 60 * 60 * 1000;
            setLog(data.filter(e => new Date(e.detectedAt).getTime() > since).reverse());
          }
        } catch(e) {}
      }, []);

      const fetchHistory = React.useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const res = await fetch(HISTORY_URL + "?t=" + Date.now());
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          setHistory(Array.isArray(data) ? data : []);
          setLastUpdate(new Date());
        } catch(e) { setError(e.message); }
        finally { setLoading(false); }
      }, []);

      React.useEffect(() => {
        if ("Notification" in window && Notification.permission === "default")
          Notification.requestPermission();
      }, []);

      React.useEffect(() => {
        fetchAlerts(false);
        fetchLog();
        const iv = setInterval(() => fetchAlerts(true), POLL_MS);
        return () => clearInterval(iv);
      }, [fetchAlerts]);

      const hasActive = Array.isArray(activeAlerts?.data) && activeAlerts.data.length > 0;

      const s = {
        page:    { padding:"16px", maxWidth:600, margin:"0 auto" },
        header:  { display:"flex", alignItems:"center", gap:10, marginBottom:20, borderBottom:"2px solid #21262d", paddingBottom:14 },
        btn:     { padding:"8px 14px", borderRadius:8, background:"#21262d", border:"1px solid #30363d", color:"#58a6ff", cursor:"pointer", fontSize:13 },
        install: { padding:"10px 16px", borderRadius:8, background:"#1f6feb", border:"1px solid #388bfd", color:"#fff", cursor:"pointer", fontSize:14, width:"100%", marginBottom:14 },
        tabOn:   { flex:1, padding:"10px", borderRadius:8, cursor:"pointer", fontSize:14, background:"#1f6feb", border:"1px solid #388bfd", color:"#fff", fontWeight:"bold" },
        tabOff:  { flex:1, padding:"10px", borderRadius:8, cursor:"pointer", fontSize:14, background:"#21262d", border:"1px solid #30363d", color:"#8b949e" },
        ok:      { background:"#0f2a1a", border:"1px solid #3fb950", borderRadius:12, padding:28, textAlign:"center" },
        cleared: { background:"#0a2a3a", border:"1px solid #58a6ff", borderRadius:12, padding:20, textAlign:"center", marginBottom:12 },
        alert:   { background:"#3d0000", border:"2px solid #f85149", borderRadius:12, padding:16, marginBottom:12, animation:"pulse 1.5s infinite" },
        histRow: { background:"#161b22", border:"1px solid #30363d", borderRadius:10, padding:12, marginBottom:8 },
        err:     { background:"#3d1f1f", border:"1px solid #f85149", borderRadius:10, padding:12, marginBottom:14, color:"#f85149", fontSize:13 },
        footer:  { marginTop:20, fontSize:11, color:"#484f58", textAlign:"center", paddingBottom:20 },
      };

      return (
        <div style={s.page}>
          <div style={s.header}>
            <span style={{fontSize:32}}>🛡️</span>
            <div style={{flex:1}}>
              <h1 style={{fontSize:19, color:"#58a6ff"}}>פיקוד העורף-נריה</h1>
              <div style={{fontSize:11, color:"#8b949e", marginTop:3}}>
                {lastUpdate ? `עודכן: ${formatTime(lastUpdate.toISOString())}` : "ממתין..."}
              </div>
            </div>
            <button style={s.btn} disabled={loading}
              onClick={() => tab==="active" ? fetchAlerts(false) : fetchHistory()}>
              {loading ? "⏳" : "🔄"}
            </button>
          </div>

          {installPrompt && (
            <button style={s.install} onClick={handleInstall}>
              📲 הוסף למסך הבית כאפליקציה
            </button>
          )}

          <SoundPicker value={alertSound} onChange={setAlertSound} />

          <div style={{display:"flex", gap:8, marginBottom:16}}>
            <button style={tab==="active" ? s.tabOn : s.tabOff}
              onClick={() => { setTab("active"); fetchAlerts(false); }}>🔴 התראות פעילות</button>
            <button style={tab==="history" ? s.tabOn : s.tabOff}
              onClick={() => { setTab("history"); fetchHistory(); fetchLog(); }}>📋 היסטוריה</button>
          </div>

          {error && <div style={s.err}>❌ {error}</div>}

          {tab==="active" && <>
            {loading && !activeAlerts && <div style={{textAlign:"center",padding:40,color:"#8b949e"}}>⏳ טוען...</div>}
            {justCleared && (
              <div style={s.cleared} className="card">
                <div style={{fontSize:36,marginBottom:8}}>✅</div>
                <div style={{color:"#58a6ff",fontSize:17,fontWeight:"bold"}}>חזרה לשגרה</div>
                <div style={{color:"#8b949e",fontSize:12,marginTop:6}}>ההתראה בוטלה באזור {FILTER_AREA}</div>
              </div>
            )}
            {!hasActive && !justCleared && activeAlerts !== null && (
              <div style={s.ok} className="card">
                <div style={{fontSize:44,marginBottom:10}}>✅</div>
                <div style={{color:"#3fb950",fontSize:17,fontWeight:"bold"}}>אין התראות פעילות כרגע</div>
                <div style={{color:"#8b949e",fontSize:12,marginTop:6}}>אזור: {FILTER_AREA}</div>
              </div>
            )}
            {hasActive && activeAlerts.data.map((area,i) => (
              <div key={i} style={s.alert} className="card">
                <div style={{color:"#f85149",fontWeight:"bold",fontSize:15}}>
                  {CATEGORY_LABELS[activeAlerts.cat] || "⚠️ התראה"}
                </div>
                <div style={{fontSize:22,marginTop:6,fontWeight:"bold"}}>{area}</div>
                <div style={{fontSize:12,color:"#8b949e",marginTop:5}}>{formatTime(activeAlerts.alertDate)}</div>
              </div>
            ))}
          </>}

          {tab==="history" && <>
            {loading && history.length===0 && <div style={{textAlign:"center",padding:40,color:"#8b949e"}}>⏳ טוען...</div>}
            {!loading && history.length===0 && log.length===0 && !error && <div style={{textAlign:"center",padding:40,color:"#8b949e"}}>אין היסטוריה עבור {FILTER_AREA}.</div>}

            {/* יומן עצמאי — 24 שעות אחרונות */}
            {log.length > 0 && (
              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,color:"#f0883e",marginBottom:8,fontWeight:"bold"}}>📋 יומן התראות (24 שעות אחרונות — עוקב עצמאי)</div>
                {log.map((item,i) => {
                  const ago = Math.round((Date.now() - new Date(item.detectedAt).getTime()) / 60000);
                  return (
                    <div key={i} style={{...s.histRow, borderColor:"#f0883e33"}} className="card">
                      <div style={{fontWeight:"bold",fontSize:13,color:"#f0883e"}}>{CATEGORY_LABELS[item.category] || "⚠️ התראה"}</div>
                      <div style={{color:"#c9d1d9",marginTop:3,fontSize:14}}>{(item.areas||[]).join(", ")}</div>
                      <div style={{fontSize:11,color:"#8b949e",marginTop:4}}>
                        {formatTime(item.detectedAt)} • לפני {ago} דק׳
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* היסטוריה מאתר פיקוד העורף */}
            {history.length > 0 && (
              <div>
                <div style={{fontSize:12,color:"#8b949e",marginBottom:8,fontWeight:"bold"}}>📡 היסטוריה מאתר פיקוד העורף</div>
                {history.slice(0,50).map((item,i) => (
                  <div key={i} style={s.histRow} className="card">
                    <div style={{fontWeight:"bold",fontSize:14}}>{CATEGORY_LABELS[item.category] || `⚠️ קטגוריה ${item.category}`}</div>
                    <div style={{color:"#c9d1d9",marginTop:4,fontSize:14}}>{item.data}</div>
                    <div style={{fontSize:11,color:"#8b949e",marginTop:5}}>{formatTime(item.alertDate)}</div>
                  </div>
                ))}
              </div>
            )}
          </>}

          <div style={s.footer}>v{VERSION} • מתרענן כל 5 דקות • oref.org.il דרך GitHub Actions</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(console.error);
    }
  </script>
</body>
</html>
